name: Update IPTV Source

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download from Worker
        run: |
          echo "📥 从 Worker 下载电视源..."
          
          # 直接调用你的 Worker
          curl -fsSL "https://zt.3438789.workers.dev" -o sy.m3u
          
          # 检查是否成功
          if [ ! -s sy.m3u ]; then
            echo "❌ 下载失败，文件为空"
            exit 1
          fi
          
          CHANNEL_COUNT=$(grep -c '#EXTINF' sy.m3u || echo "0")
          echo "✅ 共获取 $CHANNEL_COUNT 个频道"
          echo "📋 文件大小：$(wc -c < sy.m3u) 字节"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sy.m3u
          git diff --cached --quiet || git commit -m "🔄 更新直播源 $(date +%Y-%m-%d)"
          git push

      - name: Push to Gitee
        if: success()
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "🚀 推送到 Gitee..."
          
          # 检查 token 是否设置
          if [ -z "$GITEE_TOKEN" ]; then
            echo "❌ 错误: GITEE_TOKEN 未设置"
            exit 1
          fi
          
          # 取消浅克隆限制（关键！）
          echo "📦 获取完整历史..."
          git fetch --unshallow 2>/dev/null || true
          
          # 添加 Gitee 远程仓库
          git remote remove gitee 2>/dev/null || true
          git remote add gitee https://zt192:${GITEE_TOKEN}@gitee.com/zt192/sy.git
          
          # 推送到 Gitee master分支
          echo "⬆️ 开始推送..."
          git push gitee main:master --force || {
            echo "❌ Gitee 推送失败"
            exit 1
          }
          echo "✅ Gitee 推送成功"
