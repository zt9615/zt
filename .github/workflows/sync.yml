name: Update IPTV Source

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download from Worker
        run: |
          echo "📥 从 Worker 下载电视源..."
          
          # 直接调用你的 Worker
          curl -fsSL "https://zt.3438789.workers.dev" -o sy.m3u
          
          # 检查是否成功
          if [ ! -s sy.m3u ]; then
            echo "❌ 下载失败，文件为空"
            exit 1
          fi
          
          CHANNEL_COUNT=$(grep -c '#EXTINF' sy.m3u || echo "0")
          echo "✅ 共获取 $CHANNEL_COUNT 个频道"
          echo "📋 文件大小：$(wc -c < sy.m3u) 字节"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sy.m3u
          git diff --cached --quiet || git commit -m "🔄 更新直播源 $(date +%Y-%m-%d)"
          git push

      - name: Upload to Gitee
        if: success()
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "🚀 上传 sy.m3u 到 Gitee..."
          
          # 检查 token 是否设置
          if [ -z "$GITEE_TOKEN" ]; then
            echo "❌ 错误: GITEE_TOKEN 未设置"
            exit 1
          fi
          
          # Base64 编码文件内容
          CONTENT_B64=$(base64 -w 0 sy.m3u)
          
          # 先获取文件 SHA（如果文件存在）
          SHA=$(curl -s \
            -H "Authorization: token ${GITEE_TOKEN}" \
            "https://gitee.com/api/v5/repos/zt192/sy/contents/sy.m3u?ref=master" | \
            grep -o '"sha":"[^"]*"' | cut -d'"' -f4)
          
          # 构建 JSON 数据
          if [ -n "$SHA" ]; then
            # 更新已有文件
            JSON="{\"content\":\"${CONTENT_B64}\",\"message\":\"🔄 更新直播源 $(date +%Y-%m-%d)\",\"sha\":\"${SHA}\"}"
          else
            # 创建新文件
            JSON="{\"content\":\"${CONTENT_B64}\",\"message\":\"🔄 创建直播源\"}"
          fi
          
          # 使用 Gitee API 上传/更新文件
          curl -X PUT \
            -H "Content-Type: application/json" \
            -H "Authorization: token ${GITEE_TOKEN}" \
            -d "$JSON" \
            "https://gitee.com/api/v5/repos/zt192/sy/contents/sy.m3u"
          
          echo "✅ Gitee 上传完成"
