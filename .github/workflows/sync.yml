name: Update IPTV Source

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download from Worker
        run: |
          echo "📥 从 Worker 下载电视源..."
          
          # 直接调用你的 Worker
          curl -fsSL "https://zt.3438789.workers.dev" -o sy.m3u
          
          # 检查是否成功
          if [ ! -s sy.m3u ]; then
            echo "❌ 下载失败，文件为空"
            exit 1
          fi
          
          CHANNEL_COUNT=$(grep -c '#EXTINF' sy.m3u || echo "0")
          echo "✅ 共获取 $CHANNEL_COUNT 个频道"
          echo "📋 文件大小：$(wc -c < sy.m3u) 字节"

      - name: Modify channel names (🦀 + 🦞)
        run: |
          echo "🦀 添加频道名前后缀..."
          
          # 只处理包含 http 的行（排除第一行标题）
          # 格式: 频道名,http:// → 螃蟹频道名小龙虾,http://
          sed -i '/http/s/^\([^,]*\),\(http.*\)/🦀\1🦞,\2/' sy.m3u
          
          echo "✅ 频道名修改完成"
          echo "📋 示例前5行："
          head -5 sy.m3u

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 先拉取远程最新代码（避免浅克隆冲突）
          git pull --rebase origin main || true
          git add sy.m3u
          git diff --cached --quiet || git commit -m "🔄 更新直播源 $(date +%Y-%m-%d)"
          git push

      - name: Upload to Gitee
        if: success()
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "🚀 上传 sy.m3u 到 Gitee..."
          
          # 检查 token 是否设置
          if [ -z "$GITEE_TOKEN" ]; then
            echo "❌ 错误: GITEE_TOKEN 未设置"
            exit 1
          fi
          
          # 先获取文件 SHA（如果文件存在），写入临时文件
          curl -s \
            -H "Authorization: token ${GITEE_TOKEN}" \
            "https://gitee.com/api/v5/repos/zt192/sy/contents/sy.m3u?ref=master" \
            -o /tmp/gitee_file_info.json 2>/dev/null
          
          # 用 Python 构建 JSON 并上传（避免 shell 参数过长问题）
          python3 << 'PYEOF'
          import base64, json, subprocess, os
          
          token = os.environ["GITEE_TOKEN"]
          
          # 读取文件内容
          with open("sy.m3u", "rb") as f:
              content_b64 = base64.b64encode(f.read()).decode()
          
          # 读取 SHA
          sha = ""
          try:
              with open("/tmp/gitee_file_info.json") as f:
                  info = json.load(f)
                  sha = info.get("sha", "")
          except:
              pass
          
          # 构建 payload
          payload = {"content": content_b64, "message": "🔄 更新直播源"}
          if sha:
              payload["sha"] = sha
              print(f"📝 更新已有文件 (SHA: {sha[:8]}...)")
          else:
              print("📝 创建新文件")
          
          # 写入 payload 文件
          with open("/tmp/gitee_payload.json", "w") as f:
              json.dump(payload, f)
          
          # 调用 curl 上传
          result = subprocess.run([
              "curl", "-s", "-X", "PUT",
              "-H", "Content-Type: application/json",
              "-H", f"Authorization: token {token}",
              "-d", "@/tmp/gitee_payload.json",
              "https://gitee.com/api/v5/repos/zt192/sy/contents/sy.m3u"
          ], capture_output=True, text=True)
          
          print(result.stdout[:200] if result.stdout else "")
          if result.returncode != 0:
              print(f"❌ 上传失败: {result.stderr}")
              exit(1)
          else:
              print("✅ Gitee 上传完成")
          PYEOF