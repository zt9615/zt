name: Update IPTV Source

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download from Worker
        run: |
          echo "📥 从 Worker 下载电视源..."
          
          # 直接调用你的 Worker
          curl -fsSL "https://zt.3438789.workers.dev" -o sy.m3u
          
          # 检查是否成功
          if [ ! -s sy.m3u ]; then
            echo "❌ 下载失败，文件为空"
            exit 1
          fi
          
          CHANNEL_COUNT=$(grep -c '#EXTINF' sy.m3u || echo "0")
          echo "✅ 共获取 $CHANNEL_COUNT 个频道"
          echo "📋 文件大小：$(wc -c < sy.m3u) 字节"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 先拉取远程最新代码（避免浅克隆冲突）
          git pull --rebase origin main || true
          git add sy.m3u
          git diff --cached --quiet || git commit -m "🔄 更新直播源 $(date +%Y-%m-%d)"
          git push

